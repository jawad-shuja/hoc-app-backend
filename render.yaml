services:
  - type: web
    name: spotter-trip-planner-api
    runtime: python
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    startCommand: gunicorn config.wsgi --bind "0.0.0.0:${PORT:-8000}" --workers 2 --timeout 120
    healthCheckPath: /health/
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        sync: false       # set to your-app.onrender.com in the Render dashboard
      - key: CORS_ALLOWED_ORIGINS
        sync: false       # set to your Vercel frontend URL
      - key: OPENROUTESERVICE_API_KEY
        sync: false
